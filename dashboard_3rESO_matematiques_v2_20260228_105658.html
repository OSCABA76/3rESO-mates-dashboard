      function bar(id, x, y, title, xlab, ylab, horizontal=false, color=null, height=380, margin={t:60,l:60,r:40,b:60}) {
        const trace = {type:'bar', x:x, y:y, orientation: horizontal? 'h' : 'v', marker:{color: color || undefined}};
        const layout = {title, xaxis:{title:xlab}, yaxis:{title:ylab}, height, margin};
        Plotly.newPlot(id, [trace], layout, {displayModeBar:false});
      }

      // Franges
      (function(){
        const fr = DATA.franges_counts; const cats = Object.keys(fr); const vals = cats.map(k=>fr[k]);
        bar('fig-franges', cats, vals, 'Distribució de notes finals per franges', 'Franja', "Nombre d'alumnes");
      })();

      // Histograma
      (function(){
        const vals = DATA.full_table.map(r=>r['Nota final']);
        const trace = {type:'histogram', x:vals, nbinsx:10, marker:{color:'#807dba'}};
        const layout = {title:'Histograma de notes finals', xaxis:{title:'Nota final'}, yaxis:{title:"Nombre d'alumnes"}, height:380, margin:{t:60,l:60,r:40,b:60}};
        Plotly.newPlot('fig-hist',[trace],layout,{displayModeBar:false});
      })();

      // Mitjanes per unitat
      (function(){
        const em = Object.entries(DATA.exam_means).sort((a,b)=>a[1]-b[1]);
        const lm = Object.entries(DATA.llib_means).sort((a,b)=>a[1]-b[1]);
        bar('fig-exams', em.map(d=>d[1]), em.map(d=>d[0]), "Mitjana d'exàmens per unitat (ordenades)", 'Mitjana', 'Unitat', true, '#6baed6', 420, {t:60,l:120,r:40,b:60});
        bar('fig-llib', lm.map(d=>d[1]), lm.map(d=>d[0]), 'Mitjana de tasques/llibreta per unitat (ordenades)', 'Mitjana', 'Unitat', true, '#74c476', 420, {t:60,l:140,r:40,b:60});
      })();

      // Dispersions per grup
      (function(){
        const groups = ['Alt risc (<4)', 'Llindar (4–4,9)', 'Aprovats (≥5)'];
        const colors = {'Alt risc (<4)':'#ef4444', 'Llindar (4–4,9)':'#f59e0b', 'Aprovats (≥5)':'#10b981'};
        // Exams vs final
        let traces = [];
        groups.forEach(g=>{
          const pts = DATA.full_table.filter(r=>r['Grup']==g);
          traces.push({type:'scatter', mode:'markers', name:g, x:pts.map(p=>p['Mitjana exàmens']), y:pts.map(p=>p['Nota final']), marker:{size:10, color:colors[g]}, text:pts.map(p=>p['Alumne']), hovertemplate:'%{text}<br>Exàmens=%{x:.2f}<br>Final=%{y:.2f}<extra></extra>'})
        });
        Plotly.newPlot('fig-sc-ex', traces, {title:"Relació: mitjana d'exàmens vs nota final", xaxis:{title:"Mitjana d'exàmens"}, yaxis:{title:'Nota final'}, height:420, margin:{t:60,l:60,r:40,b:60}}, {displayModeBar:false});
        // Tasques vs final
        traces = [];
        groups.forEach(g=>{
          const pts = DATA.full_table.filter(r=>r['Grup']==g);
          traces.push({type:'scatter', mode:'markers', name:g, x:pts.map(p=>p['Mitjana tasques']), y:pts.map(p=>p['Nota final']), marker:{size:10, color:colors[g]}, text:pts.map(p=>p['Alumne']), hovertemplate:'%{text}<br>Tasques=%{x:.2f}<br>Final=%{y:.2f}<extra></extra>'})
        });
        Plotly.newPlot('fig-sc-ll', traces, {title:"Relació: mitjana de tasques vs nota final", xaxis:{title:"Mitjana de tasques/llibreta"}, yaxis:{title:'Nota final'}, height:420, margin:{t:60,l:60,r:40,b:60}}, {displayModeBar:false});
      })();

      // Zeros de tasques
      (function(){
        const zrows = DATA.full_table.map(r=>{ let z=0; DATA.llib_cols.forEach(u=>{ if(r[u]==0) z++; }); return {al:r['Alumne'], z}; }).filter(d=>d.z>0).sort((a,b)=>b.z-a.z);
        if(zrows.length===0) {
          Plotly.newPlot('fig-zero', [], {title:'No hi ha zeros de tasques', height:120}, {displayModeBar:false});
        } else {
          const x = zrows.map(d=>d.z), y = zrows.map(d=>d.al);
          const trace = {type:'bar', x, y, orientation:'h', marker:{color:'#fb6a4a'}};
          Plotly.newPlot('fig-zero',[trace], {title:'Alumnat amb tasques sense entregar (zeros)', xaxis:{title:'Nombre de zeros'}, yaxis:{title:'Alumne'}, height:420, margin:{t:60,l:140,r:40,b:60}}, {displayModeBar:false});
        }
      })();

      // Tendència global
      (function(){
        const trace = {type:'bar', x:['U1–U3','U5–U7'], y:[5.47, 5.01], marker:{color:['#9ecae1','#c6dbef']}};
        Plotly.newPlot('fig-trend', [trace], {title:"Tendència de la mitjana d'exàmens (U1–U3 vs U5–U7)", yaxis:{title:'Mitjana'}, height:380, margin:{t:60,l:60,r:40,b:60}}, {displayModeBar:false});
      })();

      // --- Anàlisi individual ---
      const sel = document.getElementById('sel-alumne');
      Object.keys(DATA.students).sort().forEach(n=>{ const opt=document.createElement('option'); opt.value=n; opt.text=n; sel.appendChild(opt); });

      function setStudent(name){
        const s = DATA.students[name];
        document.getElementById('kpi-nf').textContent = s.nota_final.toFixed(2);
        document.getElementById('kpi-mex').textContent = s.mitjana_ex.toFixed(2);
        document.getElementById('kpi-mt').textContent = s.mitjana_tasques.toFixed(2);
        document.getElementById('kpi-aula').textContent = s.aula.toFixed(1);
        document.getElementById('kpi-rang').textContent = s.rang + ' / ' + DATA.meta.n_students;
        document.getElementById('kpi-franja').textContent = s.franja;

        const exUnits = DATA.exam_cols; const exStu = exUnits.map(u=> s.exams[u]); const exAvg = exUnits.map(u=> DATA.exam_means[u]);
        Plotly.newPlot('fig-stu-ex-vs-class', [
          {type:'bar', x:exUnits, y:exStu, name:'Alumne', marker:{color:'#4f46e5'}},
          {type:'bar', x:exUnits, y:exAvg, name:'Mitjana classe', marker:{color:'#9ca3af'}},
        ], {barmode:'group', title:"Exàmens per unitat – Alumne vs Mitjana classe", xaxis:{title:'Unitat'}, yaxis:{title:'Nota'}, height:380, margin:{t:60,l:60,r:40,b:60}}, {displayModeBar:false});

        const llUnits = DATA.llib_cols; const llStu = llUnits.map(u=> s.tasks[u]); const llAvg = llUnits.map(u=> DATA.llib_means[u]);
        Plotly.newPlot('fig-stu-ll-vs-class', [
          {type:'bar', x:llUnits, y:llStu, name:'Alumne', marker:{color:'#16a34a'}},
          {type:'bar', x:llUnits, y:llAvg, name:'Mitjana classe', marker:{color:'#9ca3af'}},
        ], {barmode:'group', title:"Tasques/Llibreta per unitat – Alumne vs Mitjana classe", xaxis:{title:'Unitat'}, yaxis:{title:'Nota'}, height:380, margin:{t:60,l:60,r:40,b:60}}, {displayModeBar:false});

        const radarCats = ['Mitjana exàmens','Mitjana tasques','Aula','Nota final'];
        const radarVals = [s.mitjana_ex, s.mitjana_tasques, s.aula, s.nota_final];
        const stuArray = Object.values(DATA.students);
        const radarAvg = [
          stuArray.reduce((a,b)=>a+b.mitjana_ex,0)/DATA.meta.n_students,
          stuArray.reduce((a,b)=>a+b.mitjana_tasques,0)/DATA.meta.n_students,
          stuArray.reduce((a,b)=>a+b.aula,0)/DATA.meta.n_students,
          DATA.meta.avg_final
        ];
        Plotly.newPlot('fig-stu-radar', [
          {type:'scatterpolar', r: radarVals, theta: radarCats, fill:'toself', name:'Alumne', marker:{color:'#4f46e5'}},
          {type:'scatterpolar', r: radarAvg, theta: radarCats, fill:'toself', name:'Mitjana classe', marker:{color:'#9ca3af'}}
        ], {title:'Perfil global (radar)', polar:{radialaxis:{visible:true, range:[0,10]}}, height:380, margin:{t:60,l:60,r:40,b:60}}, {displayModeBar:false});

        Plotly.newPlot('fig-stu-trend', [
          {type:'bar', x:['U1–U3','U5–U7'], y:[s.first_avg, s.last_avg], marker:{color:['#93c5fd','#bfdbfe']}}
        ], {title:"Tendència personal d'exàmens (U1–U3 vs U5–U7)", yaxis:{title:'Mitjana'}, annotations:[{x:1, y:Math.max(s.first_avg, s.last_avg)+0.2, text:(s.millora>=0?'+':'')+s.millora.toFixed(2), showarrow:false, font:{color:'#111827', size:12}}], height:380, margin:{t:60,l:60,r:40,b:60}}, {displayModeBar:false});

        const tableDiv = document.getElementById('tbl-student');
        const rows = [];
        rows.push(['Indicador','Valor']);
        rows.push(['Nota final', s.nota_final.toFixed(2)]);
        rows.push(['Mitjana exàmens', s.mitjana_ex.toFixed(2)]);
        rows.push(['Mitjana tasques', s.mitjana_tasques.toFixed(2)]);
        rows.push(['Aula', s.aula.toFixed(1)]);
        rows.push(['Rang', s.rang + ' / ' + DATA.meta.n_students]);
        rows.push(['Franja', s.franja]);
        rows.push(['Zeros de tasques', s.zeros_tasques]);
        rows.push(['—','—']);
        Object.entries(s.exams).forEach(([k,v])=>rows.push([k, v.toFixed(2)]));
        Object.entries(s.tasks).forEach(([k,v])=>rows.push([k, v.toFixed(2)]));
        let html = '<table><thead><tr><th>Concepte</th><th>Valor</th></tr></thead><tbody>';
        rows.forEach(r=>{ html += `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>` });
        html += '</tbody></table>';
        tableDiv.innerHTML = html;
      }

      sel.addEventListener('change', e=> setStudent(e.target.value));
      if(sel.options.length>0) setStudent(sel.options[0].value);

      // Selector de mètrica per rànquing
      (function(){
        const options = [...DATA.exam_cols, ...DATA.llib_cols, 'Nota final','Mitjana exàmens','Mitjana tasques'];
        const containerId = 'fig-selector-metric';
        function draw(metric){
          const sorted = DATA.full_table.slice().sort((a,b)=> b[metric]-a[metric]);
          const x = sorted.map(r=>r[metric]);
          const y = sorted.map(r=>r['Alumne']);
          Plotly.newPlot(containerId, [{type:'bar', x, y, orientation:'h', marker:{color:'#6366f1'}}], {title:"Selector: indicador per alumne (canvia al menú)", xaxis:{title:metric}, yaxis:{title:'Alumne'}, height:520, margin:{t:60,l:160,r:40,b:60}}, {displayModeBar:false});
        }
        const metric = 'Nota final';
        draw(metric);
        const figDiv = document.getElementById(containerId);
        const select = document.createElement('select'); select.style.margin='6px 0';
        options.forEach(m=>{ const o=document.createElement('option'); o.value=m; o.textContent=m; select.appendChild(o); });
        select.value = metric; figDiv.parentNode.insertBefore(select, figDiv);
        select.addEventListener('change', e=> draw(e.target.value));
      })();
    </script>
  </body>
